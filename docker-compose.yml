# Vaani — local development stack.
#
# Infra only by default:  docker compose up -d db redis qdrant
# Full stack (once service Dockerfiles exist in later phases):  docker compose up
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vaani
      POSTGRES_PASSWORD: vaani
      POSTGRES_DB: vaani
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaani"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage

  # ── Application services (enabled in their respective phases) ──────────────
  # api:
  #   build: ./apps/api
  #   env_file: .env
  #   depends_on: { db: { condition: service_healthy }, redis: { condition: service_healthy } }
  #   ports: ["4000:4000"]
  #
  # voice-engine:
  #   build: ./apps/voice-engine
  #   env_file: .env
  #   depends_on: [redis, qdrant]
  #   ports: ["7860:7860"]
  #
  # web:
  #   build: ./apps/web
  #   env_file: .env
  #   depends_on: [api]
  #   ports: ["3000:3000"]

volumes:
  pgdata:
  qdrant_storage:
